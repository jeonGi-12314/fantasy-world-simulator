<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚔ Fantasy World Simulator</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header id="header">
  <div class="header-left">
    <span class="logo">⚔ Fantasy World Simulator</span>
    <span class="day-info"><span id="day-number">1년 🌸봄 1일</span></span>
  </div>
  <div class="header-center">
    <div class="threat-container" id="threat-container">
      <span class="threat-label">세계 위협도</span>
      <div class="threat-gauge">
        <div class="threat-fill" id="threat-fill" style="width:10%"></div>
      </div>
      <span class="threat-value" id="threat-value">10</span>
      <span class="threat-status" id="threat-status">평화로운 왕국</span>
    </div>
  </div>
  <div class="header-right">
    <button id="theme-toggle" title="테마 전환">🌙</button>
    <button id="save-btn" class="btn-header">💾 저장</button>
    <button id="load-btn" class="btn-header">📂 불러오기</button>
    <button id="settings-btn" class="btn-header">⚙ 설정</button>
  </div>
</header>

<!-- ═══ MAIN 3-PANEL ═══ -->
<main id="main">

  <!-- LEFT PANEL -->
  <aside id="left-panel">
    <button id="next-day-btn" class="btn-next-day" title="하루 진행">
      ▶ Next Day
    </button>
    <div class="next-event-row">
      <button id="next-event-btn" class="btn-next-event" title="자동 진행">⚡ Next Event</button>
      <select id="next-event-mode" class="next-event-select" title="정지 조건">
        <option value="choice">선택지</option>
        <option value="important">중요이벤트</option>
      </select>
    </div>
    <div class="speed-control-row" data-tooltip="이야기 흐름 속도 조절&#10;관계 형성·스탯 성장·연애 진행 속도에 영향">
      <span class="speed-control-label">📖</span>
      <input type="range" id="speed-slider" min="0" max="3" value="1" class="speed-slider">
      <span id="speed-label" class="speed-value-label">보통</span>
    </div>
    <div class="panel-section-title">모험가 목록</div>
    <div id="character-list"></div>
    <button id="add-character-btn" class="btn-add-char">＋ 캐릭터 추가</button>
  </aside>

  <!-- CENTER PANEL -->
  <section id="center-panel">
    <div id="adventure-log-header">
      <div class="log-header-row">
        <h2>📜 Adventure Log</h2>
        <button id="clear-log-btn" class="btn-small" title="로그 삭제">🗑 삭제</button>
      </div>
      <div id="story-choice-queue"></div>
    </div>
    <div id="log-entries">
      <div class="log-day-separator">
        <span>— 시뮬레이터를 시작하세요 —</span>
      </div>
      <div class="log-entry log-system">
        <p>⚔ Fantasy World Simulator에 오신 것을 환영합니다.</p>
        <p>왼쪽 패널에서 캐릭터를 추가하고, <strong>▶ Next Day</strong> 버튼을 눌러 모험을 시작하세요.</p>
      </div>
    </div>
  </section>

  <!-- RIGHT PANEL -->
  <aside id="right-panel">
    <div class="panel-tabs">
      <button class="tab-btn active" data-tab="market">📊 시장</button>
      <button class="tab-btn" data-tab="inventory">🎒 인벤토리</button>
      <button class="tab-btn" data-tab="relations">💞 관계도</button>
      <button class="tab-btn" data-tab="base">🏰 거점</button>
    </div>
    <div id="right-panel-content"></div>
  </aside>

</main>

<!-- ═══ MODALS ═══ -->

<!-- Character Creation Modal -->
<div id="char-create-modal" class="modal-overlay hidden">
  <div class="modal-box modal-large">
    <div class="modal-header">
      <h3>⚔ 캐릭터 생성</h3>
      <button class="modal-close" data-modal="char-create-modal">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-col">
          <div class="form-group">
            <label>이름 <span class="required">*</span> <button id="random-name-btn" class="btn-small" type="button" title="성별에 맞는 이름 자동 생성">🎲</button></label>
            <input type="text" id="char-name" placeholder="캐릭터 이름 입력" maxlength="20" />
          </div>
          <div class="form-group">
            <label>성별</label>
            <div class="btn-group">
              <button class="toggle-btn active" data-group="gender" data-value="male">남성</button>
              <button class="toggle-btn" data-group="gender" data-value="female">여성</button>
              <button class="toggle-btn" data-group="gender" data-value="other">기타</button>
            </div>
          </div>
          <div class="form-group">
            <label>캐릭터 아이콘</label>
            <div id="icon-picker" class="icon-picker-grid">
              <!-- populated by JS when gender changes -->
            </div>
          </div>
          <div class="form-group">
            <label>MBTI</label>
            <select id="char-mbti">
              <option value="">선택</option>
              <option>INTJ</option><option>INTP</option><option>ENTJ</option><option>ENTP</option>
              <option>INFJ</option><option>INFP</option><option>ENFJ</option><option>ENFP</option>
              <option>ISTJ</option><option>ISFJ</option><option>ESTJ</option><option>ESFJ</option>
              <option>ISTP</option><option>ISFP</option><option>ESTP</option><option>ESFP</option>
            </select>
          </div>
          <div class="form-group">
            <label>성향 (Alignment)</label>
            <div class="btn-group">
              <button class="toggle-btn active alignment-light" data-group="alignment" data-value="Light">☀ 선</button>
              <button class="toggle-btn alignment-neutral" data-group="alignment" data-value="Neutral">⚖ 중립</button>
              <button class="toggle-btn alignment-dark" data-group="alignment" data-value="Dark">🌑 악</button>
            </div>
          </div>
          <div class="form-group">
            <label>초기 정신 상태</label>
            <select id="char-mental">
              <option value="stable">안정</option>
              <option value="anxious">불안</option>
              <option value="traumatized">외상</option>
              <option value="determined">결의</option>
            </select>
          </div>
        </div>
        <div class="form-col">
          <div class="form-group">
            <label>
              스탯 배분 <span id="stat-points-left" class="points-badge">20 포인트 남음</span>
              <button id="randomize-stats-btn" class="btn-small" style="margin-left:6px">🎲 랜덤</button>
            </label>
            <div id="stat-distribution">
              <!-- generated by JS -->
            </div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>초기 관계 설정 <button id="add-relation-btn" class="btn-small">＋ 추가</button></label>
        <div id="initial-relations-list"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="char-create-submit" class="btn-primary">캐릭터 생성</button>
      <button id="total-random-btn" class="btn-secondary" title="모든 항목을 랜덤으로 채웁니다">🎲 전체 랜덤</button>
      <button class="btn-secondary modal-close" data-modal="char-create-modal">취소</button>
    </div>
  </div>
</div>

<!-- Class Promotion Modal -->
<div id="class-promo-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3>⬆ 전직 제안</h3>
    </div>
    <div class="modal-body" id="class-promo-content"></div>
    <div class="modal-footer">
      <button id="class-promo-accept" class="btn-primary">수락</button>
      <button id="class-promo-refuse" class="btn-secondary">거부</button>
    </div>
  </div>
</div>

<!-- Story Choice Modal -->
<div id="story-choice-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3>📖 선택의 기로</h3>
    </div>
    <div class="modal-body" id="story-choice-content"></div>
    <div class="modal-footer" id="story-choice-buttons"></div>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="modal-overlay hidden">
  <div class="modal-box modal-large">
    <div class="modal-header">
      <h3>⚙ 시스템 설정</h3>
      <button class="modal-close" data-modal="settings-modal">✕</button>
    </div>
    <div class="modal-body">
      <div class="settings-tabs">
        <button class="stab-btn active" data-stab="relation">관계 설정</button>
        <button class="stab-btn" data-stab="gameplay">게임플레이</button>
        <button class="stab-btn" data-stab="economy">경제 시스템</button>
        <button class="stab-btn" data-stab="display">표시 설정</button>
        <button class="stab-btn" data-stab="manage">관리</button>
      </div>
      <div id="settings-content"></div>
    </div>
    <div class="modal-footer">
      <button id="settings-save" class="btn-primary">저장</button>
      <button class="btn-secondary modal-close" data-modal="settings-modal">닫기</button>
    </div>
  </div>
</div>

<!-- Ending Modal -->
<div id="ending-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="ending-title">엔딩</h3>
    </div>
    <div class="modal-body" id="ending-content"></div>
    <div class="modal-footer">
      <button id="ending-continue" class="btn-primary">계속 플레이</button>
      <button id="ending-new" class="btn-secondary">새 게임</button>
    </div>
  </div>
</div>

<!-- Character Edit Modal -->
<div id="char-edit-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3>✏ 캐릭터 수정</h3>
      <button class="modal-close" data-modal="char-edit-modal">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">이름</label>
        <input id="edit-char-name" type="text" class="form-input" placeholder="캐릭터 이름">
      </div>
      <div class="form-group" style="margin-top:10px">
        <label class="form-label">초상화</label>
        <div id="edit-portrait-picker" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px"></div>
      </div>
      <div class="form-group" style="margin-top:10px">
        <label class="form-label">성향</label>
        <select id="edit-char-alignment" class="form-select" style="width:100%;margin-top:4px"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button id="char-edit-submit" class="btn-primary">저장</button>
      <button class="btn-secondary modal-close" data-modal="char-edit-modal">취소</button>
    </div>
  </div>
</div>

<!-- Relation Graph Modal -->
<div id="relation-graph-modal" class="modal-overlay hidden">
  <div class="modal-box modal-large">
    <div class="modal-header">
      <h3>🕸 관계도 전체 보기</h3>
      <button class="modal-close" data-modal="relation-graph-modal">✕</button>
    </div>
    <div class="modal-body" id="relation-graph-content"></div>
  </div>
</div>

<!-- Toast Notification -->
<div id="toast-container"></div>

<!-- Scripts -->
<script src="js/config.js"></script>
<script src="js/events.js"></script>
<script src="js/market.js"></script>
<script src="js/game.js"></script>
<script src="js/ui.js"></script>
<script src="js/storage.js"></script>
<script src="js/main.js"></script>
</body>
</html>
